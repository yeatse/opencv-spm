name: Build OpenCV xcframework

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Prepare Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: actions-setup-cmake
        uses: jwlawson/actions-setup-cmake@v1.13.1
        with:
          cmake-version: 3.28

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: opencv-spm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Get version
        id: get_version
        working-directory: opencv-spm
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Checkout OpenCV
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: refs/tags/${{ steps.get_version.outputs.VERSION }}
          path: 'opencv'
      
      - name: Build xcframework
        working-directory: opencv
        env:
          IPHONEOS_DEPLOYMENT_TARGET: 12.0
          MACOSX_DEPLOYMENT_TARGET: 10.13
        run: |
          shopt -s nullglob
          patches=("$GITHUB_WORKSPACE"/opencv-spm/patches/*.patch)
          if [ ${#patches[@]} -gt 0 ]; then
            git apply "${patches[@]}"
          fi
          # OpenCV 5.x's build scripts call `git branch --show-current` and abort
          # if it returns empty, which happens on the detached HEAD left by a tag
          # checkout. Put HEAD on a named branch so the build can proceed.
          git checkout -b release
          pip3 install pathlib
          # Exclude the ptcloud module: its generated Obj-C binding declares a
          # `VolumeType` enum that collides with a macOS system typedef
          # (OSType VolumeType from CoreServices), breaking the macOS Obj-C
          # module build. ptcloud has no dependents and was not shipped in the
          # 4.x releases. (--without is forwarded as -DBUILD_opencv_ptcloud=OFF.)
          python3 platforms/apple/build_xcframework.py \
              --iphoneos_archs=arm64 \
              --visionos_archs=arm64 \
              --visionsimulator_archs=arm64 \
              --without ptcloud \
              -o build

      - name: Zip artifact
        working-directory: opencv
        run: zip -ry opencv2.xcframework.zip build/opencv2.xcframework

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv2.xcframework.zip
          path: opencv/opencv2.xcframework.zip
          if-no-files-found: error
